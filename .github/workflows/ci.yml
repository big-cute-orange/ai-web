name: CI

on:
  push:
    branches:
      - main
      - 'm[0-9]*' # m1, m2, m2-1, m3-task-3.4 ...

# 同一分支连续 push 时，自动取消还在跑的旧任务
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉代码
      - uses: actions/checkout@v4

      # 2. 安装 pnpm（版本和本地 packageManager 字段对齐）
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      # 3. 安装 Node 22，并启用 pnpm store 缓存
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      # 4. 装依赖（lockfile 不一致就直接挂，逼自己同步）
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. ESLint
      - name: Lint
        run: pnpm lint

      # 6. TypeScript（vue-tsc，比 nuxt build 自带的检查更严）
      - name: Typecheck
        run: pnpm typecheck

      # 7. 单元测试（暂时空套件，passWithNoTests 自动通过）
      - name: Test
        run: pnpm test

      # 8. 构建 —— 喂占位环境变量，避免模块顶层读 process.env 时崩
      - name: Build
        env:
          NUXT_JWT_SECRET: ci-dummy-secret
          NUXT_DEEPSEEK_API_KEY: ci-dummy
          NUXT_DEEPSEEK_BASE_URL: https://api.deepseek.com/v1
          NUXT_QWEN_API_KEY: ci-dummy
          NUXT_QWEN_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode/v1
          NUXT_WECHAT_APP_ID: ci-dummy
          NUXT_WECHAT_APP_SECRET: ci-dummy
          NUXT_WECHAT_REDIRECT_URI: ''
          DATABASE_URL: postgres://ci:ci@localhost/ci
          DATABASE_DIRECT_URL: postgres://ci:ci@localhost/ci
        run: pnpm build
